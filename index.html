<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Amir's Roadmap 2029</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=27">
  <style>
    /* ── QUARTER GRID ── */
    .q-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;margin-bottom:1rem}
    .q-card{background:var(--bg2);border:1px solid rgba(187,203,185,.18);border-radius:var(--r2);padding:1.375rem 1.5rem;cursor:pointer;transition:all .2s;box-shadow:var(--shadow-sm)}
    .q-card:hover{transform:translateY(-3px);box-shadow:var(--shadow);border-color:rgba(0,109,50,.22)}
    .q-card.act{border-color:var(--acc);background:var(--acc-bg);box-shadow:0 0 0 3px rgba(0,109,50,.12),var(--shadow)}
    .q-id{font-size:11px;font-weight:800;color:var(--acc);text-transform:uppercase;letter-spacing:.7px;margin-bottom:3px;font-family:'Space Grotesk',sans-serif}
    .q-type{font-size:10px;color:var(--t2);margin-bottom:1rem}
    .q-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .q-stat{background:rgba(255,255,255,.55);border-radius:var(--r);padding:.625rem;border:1px solid rgba(0,0,0,.05)}
    .q-stat-l{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.4px}
    .q-stat-v{font-family:'Space Grotesk',monospace;font-size:22px;font-weight:700;color:var(--t0);margin-top:3px;letter-spacing:-.4px;line-height:1.1}
    .q-card.act .q-stat-v{color:var(--acc)}
    .q-bar{height:5px;border-radius:3px;background:rgba(0,0,0,.08);margin-top:12px;overflow:hidden}
    .q-bar-fill{height:100%;border-radius:3px;background:var(--acc)}
    /* ── MILESTONE LIST ── */
    .ms-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--bdr)}
    .ms-row:last-child{border-bottom:none}
    .ms-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
    .ms-week{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--acc);width:32px;flex-shrink:0}
    .ms-date{font-size:10.5px;color:var(--t2);width:110px;flex-shrink:0}
    .ms-chips{display:flex;gap:6px;flex:1;flex-wrap:wrap}
    .ms-chip{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);padding:.375rem .75rem;font-size:10px}
    .ms-chip-l{color:var(--t3);font-weight:700;font-size:9px;text-transform:uppercase}
    .ms-chip-v{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--t0)}
    .ms-note{font-size:10px;color:var(--t3);max-width:140px}
    /* ── STAT STRIP ── */
    .stat-strip{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-bottom:1rem}
    .st-card{background:var(--bg1);border:1px solid var(--bdr);border-radius:var(--r2);padding:.875rem 1rem;box-shadow:var(--shadow-sm)}
    .st-l{font-size:9.5px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
    .st-v{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;color:var(--t0);line-height:1;letter-spacing:-.5px}
    .st-s{font-size:10px;color:var(--t2);margin-top:3px}
    /* ── RACE CARD ── */
    .race-card{background:var(--bg1);border:1px solid var(--bdr);border-radius:var(--r2);padding:1rem;margin-bottom:8px;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow-sm);transition:all .2s}
    .race-card:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
    .race-ico{font-size:2rem;flex-shrink:0}
    .race-name{font-size:14px;font-weight:800;color:var(--t0)}
    .race-meta{font-size:11px;color:var(--t2);margin-top:2px}
    .race-days{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:var(--acc);margin-left:auto;white-space:nowrap}
    /* ── DOC SELECTOR ── */
    .doc-sel-row{display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin-bottom:1rem}
    .doc-qsel{background:var(--bg2);border:1.5px solid var(--bdr2);border-radius:var(--r);color:var(--t0);padding:6px 12px;font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:700;outline:none;cursor:pointer;margin-right:6px}
    .doc-qsel:focus{border-color:var(--acc)}
    .doc-btn{padding:5px 12px;border-radius:20px;border:1.5px solid var(--bdr2);background:var(--bg2);color:var(--t2);cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:700;transition:all .15s;white-space:nowrap}
    .doc-btn:hover{border-color:var(--acc);color:var(--acc)}
    .doc-btn.act{background:var(--acc);color:#fff;border-color:var(--acc);box-shadow:0 2px 6px rgba(67,97,238,.25)}
    /* ── MARKDOWN ── */
    .md-content{font-size:13px;line-height:1.75;color:var(--t1)}
    .md-content h1{font-size:16px;font-weight:800;color:var(--t0);margin:16px 0 8px}
    .md-content h2{font-size:14px;font-weight:800;color:var(--acc);margin:14px 0 6px}
    .md-content h3{font-size:13px;font-weight:700;color:var(--t0);margin:12px 0 5px}
    .md-content strong{color:var(--t0);font-weight:700}
    .md-content code{background:var(--bg3);padding:1px 6px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--f2)}
    .md-content hr{border:none;border-top:1px solid var(--bdr);margin:12px 0}
    .md-content ul,.md-content ol{padding-left:20px;margin:6px 0}
    .md-content li{margin:3px 0}
    .md-content p{margin:6px 0}
    /* ── FORM ── */
    .form-inp{background:var(--bg2);border:1.5px solid var(--bdr2);border-radius:var(--r);color:var(--t0);padding:7px 10px;outline:none;font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;transition:.15s}
    .form-inp:focus{border-color:var(--acc)}
    .btn{padding:8px 16px;border-radius:var(--r);border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:700;transition:all .15s}
    .btn-danger{background:var(--warn-bg);border:1px solid var(--warn-bdr);color:var(--warn)}
    /* ── EMPTY ── */
    .empty-state{text-align:center;padding:3rem 1rem;color:var(--t3)}
    .empty-ico{font-size:2.5rem;margin-bottom:.5rem}
    .empty-txt{font-size:13px}
    /* ── TIMELINE TABLE ── */
    .tl-table{width:100%;border-collapse:collapse;font-family:'Inter',sans-serif;font-size:12px}
    .tl-table thead th{position:sticky;top:0;background:var(--bg2);font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;color:var(--t2);padding:8px 12px;text-align:left;border-bottom:2px solid var(--bdr2);white-space:nowrap;z-index:2}
    .tl-table tbody td{padding:9px 12px;vertical-align:top;border-bottom:1px solid var(--bdr);font-size:11.5px;color:var(--t1);line-height:1.4}
    .tl-table tbody tr:hover td{background:var(--bg2)}
    .tl-table tbody tr:last-child td{border-bottom:none}
    /* ── MILESTONES ── */
    .ms-page{padding-bottom:2rem}
    .ms-page-hd{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:1.5rem;flex-wrap:wrap}
    .ms-page-title{font-size:18px;font-weight:800;color:var(--t0)}
    .ms-page-sub{font-size:12px;color:var(--t2);margin-top:3px}
    .ms-legend{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-top:4px}
    .ms-mc-block{margin-bottom:2rem}
    .ms-mc-header{display:flex;align-items:center;gap:10px;margin-bottom:1rem;padding-bottom:.5rem;border-bottom:2px solid var(--bdr)}
    .ms-mc-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
    .ms-mc-label{font-size:13px;font-weight:800;flex:1}
    .ms-mc-progress{font-size:11px;color:var(--t3);font-family:'JetBrains Mono',monospace;font-weight:700}
    .ms-cards{display:flex;flex-direction:column;gap:0}
    .ms-card{display:flex;gap:0}
    .ms-card-left{display:flex;flex-direction:column;align-items:center;width:28px;flex-shrink:0;padding-top:4px}
    .ms-node{width:12px;height:12px;border-radius:50%;flex-shrink:0;transition:transform .2s}
    .ms-card:hover .ms-node{transform:scale(1.3)}
    .ms-vline{width:2px;flex:1;min-height:20px;background:var(--bdr);margin-top:4px;margin-bottom:0}
    .ms-card-body{flex:1;padding:.875rem .875rem .875rem .5rem;border-radius:var(--r2);transition:background .15s;margin-bottom:4px}
    .ms-card:hover .ms-card-body{background:var(--bg2)}
    .ms-card.ms-done .ms-card-body{opacity:.65}
    .ms-card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px;flex-wrap:wrap}
    .ms-card-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
    .ms-cat-badge{font-size:9.5px;font-weight:700;padding:2px 8px;border-radius:20px;border:1px solid;display:inline-flex;align-items:center;gap:3px}
    .ms-qref{font-size:10px;font-weight:700;color:var(--t3);font-family:'JetBrains Mono',monospace}
    .ms-date-badge{font-size:10px;color:var(--t3);font-family:'JetBrains Mono',monospace}
    .ms-status{font-size:9.5px;font-weight:800;padding:2px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0}
    .ms-status.done{background:var(--f3-bg);color:var(--f3);border:1px solid var(--f3-bdr)}
    .ms-status.failed{background:var(--warn-bg);color:var(--warn);border:1px solid var(--warn-bdr)}
    .ms-status.overdue{background:var(--warn-bg);color:var(--warn);border:1px solid var(--warn-bdr)}
    .ms-status.soon{background:var(--f2-bg);color:var(--f2);border:1px solid var(--f2-bdr)}
    .ms-status.pending{background:var(--bg3);color:var(--t3);border:1px solid var(--bdr)}
    .ms-card-id{font-size:9px;font-weight:800;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:2px}
    .ms-card-title{font-size:14px;font-weight:800;color:var(--t0);margin-bottom:5px;line-height:1.3}
    .ms-card-desc{font-size:12px;color:var(--t2);line-height:1.6;margin-bottom:10px}
    .ms-gate-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
    .ms-gate{border-radius:var(--r);padding:.625rem .75rem;font-size:11px}
    .ms-gate-pass{background:var(--f3-bg);border:1px solid var(--f3-bdr)}
    .ms-gate-fail{background:var(--warn-bg);border:1px solid var(--warn-bdr)}
    .ms-gate-hd{font-size:9.5px;font-weight:800;margin-bottom:4px}
    .ms-gate-pass .ms-gate-hd{color:var(--f3)}
    .ms-gate-fail .ms-gate-hd{color:var(--warn)}
    .ms-gate-txt{font-size:11px;color:var(--t1);line-height:1.5}
    .ms-verif{margin-top:4px}
    .ms-verif summary{font-size:10px;font-weight:700;color:var(--t3);cursor:pointer;user-select:none;list-style:none;display:flex;align-items:center;gap:4px}
    .ms-verif summary::before{content:'▶';font-size:8px;transition:transform .15s}
    .ms-verif[open] summary::before{transform:rotate(90deg)}
    .ms-verif-body{font-size:11px;color:var(--t2);line-height:1.6;margin-top:5px;padding:8px;background:var(--bg2);border-radius:var(--r);border:1px solid var(--bdr)}
    @media(max-width:480px){
      .ms-gate-row{grid-template-columns:1fr}
      .ms-mc-label{font-size:12px}
    }
    /* ── MOBILE ── */
    @media(max-width:480px){
      .q-grid{grid-template-columns:1fr}
      .q-stats{grid-template-columns:repeat(2,1fr)}
      .stat-strip{grid-template-columns:repeat(2,1fr)}
      .ms-date{display:none}
      .ms-chips{flex-wrap:wrap}
      .race-card{flex-wrap:wrap}
      .race-days{margin-left:0;margin-top:4px}
      .doc-sel-row{flex-wrap:wrap;gap:4px}
      .doc-btn{font-size:10.5px;padding:4px 10px}
      .tl-q{width:80px;font-size:10px}
    }
  </style>
</head>
<body>

<!-- AUTH MODAL -->
<div class="modal-overlay" id="auth-modal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeAuthModal()">✕</button>
    <div class="modal-title">Login</div>
    <div class="modal-sub">Masuk untuk mengakses fitur tracking</div>
    <input class="modal-input" id="auth-user" type="email" placeholder="Email" autocomplete="email">
    <input class="modal-input" id="auth-pass" type="password" placeholder="Password" autocomplete="current-password">
    <div class="modal-err" id="auth-err"></div>
    <div class="modal-row">
      <button class="modal-btn secondary" onclick="closeAuthModal()">Batal</button>
      <button class="modal-btn primary" onclick="doLogin()">Login</button>
    </div>
  </div>
</div>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-brand">
    <div class="topbar-ico" style="background:#166534;color:#fff">🗺</div>
    <div>
      <div class="topbar-title">Amir's Roadmap</div>
      <div class="topbar-sub">Body Transformation · Ironman 2029 · VHM</div>
    </div>
  </div>
  <div class="auth-wrap">
    <span class="auth-user" id="auth-user-label"></span>
    <button class="auth-btn" id="auth-action-btn" onclick="onAuthBtnClick()">Login</button>
  </div>
</div>

<!-- APP -->
<div class="app">
  <div id="quarter-cards-row"></div>
  <div class="tab-nav" id="tab-nav"></div>
  <div id="panels-root"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<div id="app-version" style="position:fixed;bottom:4px;right:8px;font-size:9px;color:#999;opacity:.5;font-family:'JetBrains Mono',monospace;pointer-events:none;z-index:9999">v=27</div>
<script type="module" src="js/main.js?v=27"></script>
</body>
</html>
